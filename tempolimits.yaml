# ==============================================================================
# tempolimits.yaml  —  Zentrale Datensatz-Konfiguration
# ==============================================================================
#
# Definiert Datenpfade und Klassennamen für alle Skripte im Projekt.
# Wird von train_yolo.py, generate_universal_calib.py und split_dataset.py
# als einzige Wahrheitsquelle für Klassendefinitionen genutzt.
#
# ==============================================================================

# Basis-Pfad des Datensatzes — relativ zur Position dieser Datei
path: datasets/sorted_dataset

# Unterordner relativ zu 'path'
train: images/train
val:   images/val
# test: images/test   # Test-Split derzeit nicht aktiv

# Klassennamen (Klassen-ID → Bezeichnung)
names:
  # Klassische Tempolimits (rundes rotes Schild, direkte Zuordnung)
  0: Tempolimit_20
  1: Tempolimit_30
  2: Tempolimit_40
  3: Tempolimit_50
  4: Tempolimit_60
  5: Tempolimit_70
  6: Tempolimit_80
  7: Tempolimit_90    # Reserviert — im GTSDB-Datensatz nicht enthalten
  8: Tempolimit_100
  9: Tempolimit_110   # Reserviert — im GTSDB-Datensatz nicht enthalten
  10: Tempolimit_120
  11: Tempolimit_130  # Reserviert — im GTSDB-Datensatz nicht enthalten

  # Kontextschilder mit festem Folgegrenzwert (Auflösung in der State Machine)
  12: Spielstrasse          # → 7 km/h  (Schrittgeschwindigkeit, blauer Ring)
  13: Ende_Spielstrasse     # → 50 km/h
  14: Ortsschild            # → 50 km/h
  15: Ende_Ortsschild       # → 100 km/h

  # Aufhebungen (kontextabhängige Auflösung: innerorts 30 km/h, außerorts 100 km/h)
  16: Aufhebeschild         # Weiß mit Diagonalstreifen, ohne Zahl
  17: Aufhebeschild_Zahl    # Weiß mit durchgestrichener Zahl

  # Autobahn-Kontext
  18: Autobahn              # → 130 km/h (blauer Ring)
  19: Ende_Autobahn         # → 100 km/h
